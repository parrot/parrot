name: Github CI
on:
  push:
    branches:
      - master
      - smoke/*
    tags:
      - 'RELEASE_*_*_*'
  pull_request:
    branches:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: true
      matrix:
        CONFIGURE_ARGS:
          -
          - --debugging
    steps:
    - if: ${{ startsWith(github.ref, 'refs/tags/') }}
      name: checkout for tag
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        submodules: recursive
    - if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      name: checkout for commit --depth 50
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        fetch-tags: true
        fetch-depth: 50
        submodules: recursive
    - uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
      with:
        create-symlink: true
        key: ${{ github.job }}-${{ matrix.CONFIGURE_ARGS }}
    - if: ${{ !startsWith(matrix.CONFIGURE_ARGS, '--debugging') }}
      name: install cpan deps
      uses: perl-actions/install-with-cpm@8b1a9840b26cc3885ae2889749a48629be2501b0 # v1.9
      with:
        install: |
          Pod::Find
          Test::Perl::Critic
    - run: perl Configure.pl ${{ matrix.CONFIGURE_ARGS }}
    - run: make -j -s
    - if: ${{ startsWith(matrix.CONFIGURE_ARGS, '--debugging') }}
      run: make -j -s test
    - if: ${{ !startsWith(matrix.CONFIGURE_ARGS, '--debugging') }}
      run: make -j -s fulltest
